{% extends "quadroBase.html" %}
{% set section_title = "Membros" %}
{% block content %}
    <div class="flex flex-col items-center">
        <h1 class="text-2xl font-bold max-w-6xl w-full ps-4 mt-10 mb-6">Membros do quadro "Nome do quadro"</h1>
        <div class="max-w-6xl w-full rounded-xl overflow-hidden border border-slate-200">
            <table class="w-full">
                <tr class="bg-slate-100 text-left border border-slate-200">
                    <th class="py-4 px-8">Nome</th>
                    <th class="py-4 px-8">Email</th>
                    <th class="py-4 px-8">Função</th>
                </tr>
                {% for user in users %}
                    <tr class="border border-slate-200">
                        <td class="py-4 px-8">{{ user.nome }}</td>
                        <td class="py-4 px-8">{{ user.email }}</td>
                        <td class="py-4 px-8">{{ user.role }}</td>
                    </tr>
                {% endfor %}
            </table>
        </div>
    </div>
{% endblock %}
